name: EZIN
options:
  bundleIdPrefix: com.ezin
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.3.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
targets:
  EZIN:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: EZIN
    info:
      path: EZIN/Info.plist
      properties:
        CFBundleDisplayName: EZIN
        CFBundleShortVersionString: "1.3.0"
        CFBundleVersion: "2"
        UILaunchScreen: {}
        # VINNY Earprint: identify audio recorded from the microphone.
        NSMicrophoneUsageDescription: "EZIN uses the microphone only when you tap Record in VINNY → Earprint, to analyze the audio you point it at. Nothing is stored or sent anywhere."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Expose the app's own directory inside the Files app
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        # Best-effort background refresh/processing for reconnect + signal upkeep.
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.ezin.refresh
          - com.ezin.processing
        # Declare imported LLM file types so users can import .gguf / .safetensors
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.ezin.gguf
            UTTypeDescription: GGUF Model
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [gguf]
          - UTTypeIdentifier: com.ezin.safetensors
            UTTypeDescription: SafeTensors Model
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [safetensors]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ezin.app
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"

  # Logic-test bundle for the money-critical engine (voting, indicators, stops).
  # Only built under the `test` action — the CI `build` action never compiles it,
  # so it cannot affect the unsigned .ipa archive.
  EZINTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: EZINTests
    dependencies:
      - target: EZIN
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ezin.tests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"

# Explicit scheme so behaviour is deterministic across Xcode/CI:
#  - `xcodebuild -scheme EZIN build`  -> builds ONLY the app (test target excluded)
#  - `xcodebuild -scheme EZIN test`   -> builds + runs EZINTests
schemes:
  EZIN:
    build:
      targets:
        EZIN: all
    test:
      targets:
        - EZINTests
      gatherCoverageData: false
    run:
      config: Debug
    archive:
      config: Release
