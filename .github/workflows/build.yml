name: Build EZIN (unsigned iOS)

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    name: Build unsigned .ipa
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode (16.x — reads XcodeGen project format 77)
        run: |
          LATEST=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || true)
          sudo xcode-select -s "${LATEST:-/Applications/Xcode.app}"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Debug, no signing)
        run: |
          set -euo pipefail
          xcodebuild \
            -project EZIN.xcodeproj \
            -scheme EZIN \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package unsigned .ipa
        run: |
          set -euo pipefail
          APP_PATH=$(find build/Build/Products -maxdepth 2 -name "*.app" -type d | head -1)
          echo "App: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr EZIN-unsigned.ipa Payload
          ls -lh EZIN-unsigned.ipa

      - name: Publish unsigned .ipa to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release delete build-latest -y --cleanup-tag 2>/dev/null || true
          gh release create build-latest EZIN-unsigned.ipa \
            --title "EZIN — latest unsigned iOS build" \
            --notes "Unsigned .ipa built from commit ${{ github.sha }}." \
            --target main

      - name: Upload .ipa artifact (best-effort; may hit account storage quota)
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: EZIN-unsigned-ipa
          path: EZIN-unsigned.ipa
          retention-days: 5
          if-no-files-found: warn
